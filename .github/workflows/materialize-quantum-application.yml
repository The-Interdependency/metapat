name: Materialize quantum application outputs

on:
  push:
    branches: [agent/quantum-magnetism-application-module]

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/quantum-magnetism-application-module

      - name: Export application surfaces
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/metapat/__init__.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              '"""Public METAPAT canon, catalog, semantic-envelope, contract-check, and adapter exports."""',
              '"""Public METAPAT canon, catalog, application, semantic-envelope, contract-check, and adapter exports."""',
          )
          text = text.replace(
              "#   summary: re-exports byte-complete canon identity, addressable semantic catalog, strict immutable envelopes and relations, deterministic canon checks, explicit UCNS Phi authority, and the optional actual-UCNS adapter",
              "#   summary: re-exports byte-complete canon identity, addressable semantic catalog, strict catalog-bound application modules, immutable envelopes and relations, deterministic checks, explicit UCNS Phi authority, and the optional actual-UCNS adapter",
          )
          text = text.replace(
              "#   tests: tests.test_contracts, tests.test_envelope, tests.test_catalog, tests.test_relations, tests.test_canon_integrity, tests.test_ucns_phi, tests.test_ucns_bridge, tests.test_packaging",
              "#   tests: tests.test_contracts, tests.test_envelope, tests.test_catalog, tests.test_relations, tests.test_application, tests.test_quantum_magnetism, tests.test_canon_integrity, tests.test_ucns_phi, tests.test_ucns_bridge, tests.test_packaging",
          )
          text = text.replace(
              "#   requires: metapat_canon_core, metapat_module_envelope, metapat_semantic_relations, metapat_semantic_catalog, metapat_canon_contract_checks, metapat_ucns_phi_policy, optional metapat_ucns_adapter",
              "#   requires: metapat_canon_core, metapat_module_envelope, metapat_semantic_relations, metapat_semantic_catalog, metapat_application_module_schema, metapat_quantum_magnetism_application, metapat_canon_contract_checks, metapat_ucns_phi_policy, optional metapat_ucns_adapter",
          )
          text = text.replace(
              "#   imports: metapat.canon, metapat.catalog, metapat.relations, metapat.envelope, metapat.flow_plan, metapat.validation, metapat.ucns_phi, metapat.ucns",
              "#   imports: metapat.canon, metapat.catalog, metapat.application, metapat.quantum_magnetism, metapat.relations, metapat.envelope, metapat.flow_plan, metapat.validation, metapat.ucns_phi, metapat.ucns",
          )
          text = text.replace('__version__ = "0.4.0"', '__version__ = "0.5.0"')
          marker = "from .canon import ("
          imports = '''from .application import (\n    APPLICATION_BINDING_SCHEMA_ID,\n    APPLICATION_BINDING_SCHEMA_VERSION,\n    APPLICATION_CLAIM_STATUSES,\n    APPLICATION_SCHEMA_ID,\n    APPLICATION_SCHEMA_VERSION,\n    ApplicationCatalogBinding,\n    MetapatApplicationModule,\n    application_source_mismatches,\n    assert_application_sources_match,\n    bind_catalog_module,\n    validate_application_against_catalog,\n)\n'''
          if imports not in text:
              text = text.replace(marker, imports + marker)
          quantum_marker = "from .relations import ("
          quantum_imports = '''from .quantum_magnetism import (\n    QUANTUM_MAGNETISM_APPLICATION_VERSION,\n    QUANTUM_MAGNETISM_BINDING_SPECS,\n    quantum_magnetism_application_digest,\n    quantum_magnetism_application_module,\n)\n'''
          if quantum_imports not in text:
              text = text.replace(quantum_marker, quantum_imports + quantum_marker)
          additions = '''    "APPLICATION_BINDING_SCHEMA_ID",\n    "APPLICATION_BINDING_SCHEMA_VERSION",\n    "APPLICATION_CLAIM_STATUSES",\n    "APPLICATION_SCHEMA_ID",\n    "APPLICATION_SCHEMA_VERSION",\n    "ApplicationCatalogBinding",\n    "MetapatApplicationModule",\n    "QUANTUM_MAGNETISM_APPLICATION_VERSION",\n    "QUANTUM_MAGNETISM_BINDING_SPECS",\n    "application_source_mismatches",\n    "assert_application_sources_match",\n    "bind_catalog_module",\n    "quantum_magnetism_application_digest",\n    "quantum_magnetism_application_module",\n    "validate_application_against_catalog",\n'''
          if '    "APPLICATION_SCHEMA_ID",' not in text:
              text = text.replace('    "validate_fork_authorization",\n]', '    "validate_fork_authorization",\n' + additions + ']')
          path.write_text(text, encoding="utf-8")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and generators
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Generate application fixture and metadata graph
        run: |
          python tools/generate_application_fixtures.py
          python tools/generate_msdmd.py

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/metapat/__init__.py src/metapat/fixtures/quantum-magnetism-application-v1.json metapat_msdmd.ts
          if git diff --cached --quiet; then
            echo "Generated outputs already current."
            exit 0
          fi
          git commit -m "build(application): materialize quantum application evidence"
          git push origin HEAD:agent/quantum-magnetism-application-module
