name: temporary Phi diagnostics

on:
  push:
    branches:
      - agent/metapat-ucns-phi-policy
    paths:
      - .github/workflows/phi-diagnostics.yml

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/metapat-ucns-phi-policy
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and test tools
        run: python -m pip install -e .[dev]
      - name: Capture focused test and regenerate canonical metadata
        shell: bash
        run: |
          set +e
          python -m pytest -vv tests/test_ucns_phi.py > phi-test-diagnostic.txt 2>&1
          printf '\nexit_status=%s\n' "$?" >> phi-test-diagnostic.txt
          set -e
          python tools/generate_msdmd.py
      - name: Commit exact generated evidence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metapat_msdmd.ts phi-test-diagnostic.txt
          git diff --cached --exit-code && exit 0
          git commit -m "build(phi): materialize metadata and diagnostic"
          git push origin HEAD:agent/metapat-ucns-phi-policy
