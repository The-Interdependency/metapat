name: Materialize electromagnetic pipe outputs

on:
  push:
    branches: [agent/electromagnetic-pipe-application-module]
  pull_request:
    branches: [agent/quantum-magnetism-application-module]

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/electromagnetic-pipe-application-module

      - name: Reconcile package, source boundary, and standing CI
        run: |
          python - <<'PY'
          from pathlib import Path

          pipe_path = Path("src/metapat/electromagnetic_pipe.py")
          pipe_text = pipe_path.read_text(encoding="utf-8")
          pipe_text = pipe_text.replace(
              'EVIDENCE_BOUNDARY = "The geometry and control topology are an engineering proposal. Magnetic, shielding, phase-delay, heating, fault-containment, insulation, motion, alloy, and protection-distance performance remain answerable to simulation, characterization, qualification testing, and instrumented prototypes."',
              'EVIDENCE_BOUNDARY = "The geometry and control topology are specified as an engineering proposal. Claimed magnetic, shielding, phase-delay, fault-containment, thermal, high-voltage, mechanical, and materials performance remain answerable to electromagnetic simulation, circuit analysis, coupon characterization, vacuum insulation testing, thermal testing, fault testing, and instrumented prototypes."',
          )
          pipe_path.write_text(pipe_text, encoding="utf-8")

          init_path = Path("src/metapat/__init__.py")
          text = init_path.read_text(encoding="utf-8")
          text = text.replace("tests.test_quantum_magnetism, tests.test_canon_integrity", "tests.test_quantum_magnetism, tests.test_electromagnetic_pipe, tests.test_canon_integrity")
          text = text.replace("metapat_quantum_magnetism_application, metapat_canon_contract_checks", "metapat_quantum_magnetism_application, metapat_electromagnetic_pipe_application, metapat_canon_contract_checks")
          text = text.replace("metapat.quantum_magnetism, metapat.relations", "metapat.quantum_magnetism, metapat.electromagnetic_pipe, metapat.relations")
          text = text.replace('__version__ = "0.5.0"', '__version__ = "0.6.0"')
          marker = "from .envelope import ("
          imports = '''from .electromagnetic_pipe import (
    ALLOY_CANDIDATE_SCHEMA_ID,
    ALLOY_CANDIDATE_SCHEMA_VERSION,
    PIPE_APPLICATION_VERSION,
    PIPE_BINDING_SPECS,
    PIPE_DESIGN_SCHEMA_ID,
    PIPE_DESIGN_SCHEMA_VERSION,
    WINDING_LAYER_SCHEMA_ID,
    WINDING_LAYER_SCHEMA_VERSION,
    AlloyCandidate,
    ElectromagneticPipeDesign,
    WindingLayerSpec,
    electromagnetic_pipe_application_module,
    electromagnetic_pipe_design,
    electromagnetic_pipe_design_digest,
)
'''
          if imports not in text:
              text = text.replace(marker, imports + marker)
          additions = '''    "ALLOY_CANDIDATE_SCHEMA_ID",
    "ALLOY_CANDIDATE_SCHEMA_VERSION",
    "PIPE_APPLICATION_VERSION",
    "PIPE_BINDING_SPECS",
    "PIPE_DESIGN_SCHEMA_ID",
    "PIPE_DESIGN_SCHEMA_VERSION",
    "WINDING_LAYER_SCHEMA_ID",
    "WINDING_LAYER_SCHEMA_VERSION",
    "AlloyCandidate",
    "ElectromagneticPipeDesign",
    "WindingLayerSpec",
    "electromagnetic_pipe_application_module",
    "electromagnetic_pipe_design",
    "electromagnetic_pipe_design_digest",
'''
          if '    "PIPE_DESIGN_SCHEMA_ID",' not in text:
              text = text.replace('    "validate_application_against_catalog",
]', '    "validate_application_against_catalog",
' + additions + ']')
          init_path.write_text(text, encoding="utf-8")

          ci_path = Path(".github/workflows/ci.yml")
          ci = ci_path.read_text(encoding="utf-8")
          ci = ci.replace(
              "Verify application-module and quantum vertical-slice contracts",
              "Verify application-module vertical-slice contracts",
          )
          ci = ci.replace(
              "python -m pytest -q tests/test_application.py tests/test_quantum_magnetism.py",
              "python -m pytest -q tests/test_application.py tests/test_quantum_magnetism.py tests/test_electromagnetic_pipe.py",
          )
          old_source = '''          application = metapat.quantum_magnetism_application_module(catalog)
          metapat.validate_application_against_catalog(application, catalog)
          metapat.assert_application_sources_match(Path("."), application)'''
          new_source = '''          quantum = metapat.quantum_magnetism_application_module(catalog)
          pipe = metapat.electromagnetic_pipe_application_module(catalog)
          for application in (quantum, pipe):
              metapat.validate_application_against_catalog(application, catalog)
              metapat.assert_application_sources_match(Path("."), application)'''
          ci = ci.replace(old_source, new_source)
          ci = ci.replace(
              '          application_fixture = files("metapat").joinpath("fixtures/quantum-magnetism-application-v1.json")',
              '          application_fixture = files("metapat").joinpath("fixtures/quantum-magnetism-application-v1.json")\n          pipe_fixture = files("metapat").joinpath("fixtures/three-phase-electromagnetic-pipe-v1.json")',
          )
          ci = ci.replace(
              "          assert application_fixture.is_file()",
              "          assert application_fixture.is_file()\n          assert pipe_fixture.is_file()",
          )
          ci = ci.replace(
              "          application = metapat.quantum_magnetism_application_module(catalog)",
              "          application = metapat.quantum_magnetism_application_module(catalog)\n          pipe_design = metapat.electromagnetic_pipe_design(catalog)",
          )
          ci = ci.replace(
              "          assert application_fixture.read_text(encoding=\"utf-8\").strip() == application.to_json()",
              "          assert application_fixture.read_text(encoding=\"utf-8\").strip() == application.to_json()\n          assert pipe_fixture.read_text(encoding=\"utf-8\").strip() == pipe_design.to_json()",
          )
          ci = ci.replace(
              "          assert application.catalog_digest == catalog.catalog_digest",
              "          assert application.catalog_digest == catalog.catalog_digest\n          assert pipe_design.application.catalog_digest == catalog.catalog_digest",
          )
          ci = ci.replace(
              "          assert len(application.catalog_bindings) == 12",
              "          assert len(application.catalog_bindings) == 12\n          assert len(pipe_design.application.catalog_bindings) == 20\n          assert pipe_design.phase_circuit_count == 18\n          assert pipe_design.three_phase_system_count == 6",
          )
          ci = ci.replace(
              "          assert application.application_digest",
              "          assert application.application_digest\n          assert pipe_design.design_digest",
          )
          ci_path.write_text(ci, encoding="utf-8")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and generators
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Generate fixtures and metadata graph
        run: |
          python tools/generate_application_fixtures.py
          python tools/generate_msdmd.py

      - name: Verify electromagnetic pipe contracts
        run: |
          python -m pytest -q tests/test_electromagnetic_pipe.py
          python tools/check_contract_graph.py
          python tools/generate_application_fixtures.py --check
          python tools/generate_msdmd.py --check

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/metapat/electromagnetic_pipe.py src/metapat/__init__.py .github/workflows/ci.yml src/metapat/fixtures/three-phase-electromagnetic-pipe-v1.json metapat_msdmd.ts
          if git diff --cached --quiet; then
            echo "Generated outputs already current."
            exit 0
          fi
          git commit -m "build(application): materialize electromagnetic pipe evidence"
          git push origin HEAD:agent/electromagnetic-pipe-application-module
