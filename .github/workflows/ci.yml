name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  materialize-pipe-metadata:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/release-electromagnetic-pipe-v060' && github.actor != 'github-actions[bot]'
    name: Materialize electromagnetic-pipe metadata
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: agent/release-electromagnetic-pipe-v060

      - name: Add bounded module metadata
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/metapat/electromagnetic_pipe.py")
          text = path.read_text(encoding="utf-8")
          if "# id: metapat_electromagnetic_pipe_application" not in text:
              header = '''# === MODULE_BUILD ===
          # id: metapat_electromagnetic_pipe_application
          #   module_name: metapat.electromagnetic_pipe
          #   module_kind: schema
          #   summary: preserves the three-phase nested electromagnetic-pipe handoff as a strict catalog-bound engineering application and design record without claiming device performance
          #   owner: The Interdependency
          #   public_surface: pipe application and design schema constants, WindingLayerSpec, AlloyCandidate, ElectromagneticPipeDesign, electromagnetic_pipe_application_module, electromagnetic_pipe_design, electromagnetic_pipe_design_digest
          #   internal_surface: source declarations, binding specifications, canonical JSON and digest helpers
          #   auth_boundary: none
          #   storage_boundary: serialization-only and read-only source verification
          #   network_boundary: none
          #   user_data_boundary: public engineering handoff and provenance only
          #   admin_only: false
          #   tests: tests.test_electromagnetic_pipe
          #   rollout: public package exports and deterministic fixture in metapat 0.6.0
          #   rollback: remove electromagnetic-pipe exports and fixture while preserving the generic application schema and semantic catalog
          #   requires: metapat_application_module_schema, metapat_semantic_catalog
          #   since: 2026-07-21
          #   unresolved: frequency, current, target field, shielding, phase shift, attractor geometry, thermal limits, protection distance, and alloy performance remain empirical frontiers
          # === END MODULE_BUILD ===

          # === DOCS ===
          # id: metapat_electromagnetic_pipe_docs
          #   summary: preserves geometry, six-vector control topology, mobile-attractor distinction, alloy search, instrumentation, fault objectives, and empirical boundaries
          #   audience: developer, electrical engineer, materials engineer, safety reviewer, agent
          #   source: docs/applications/three-phase-electromagnetic-pipe.md
          #   covers: electromagnetic_pipe_application_module, electromagnetic_pipe_design, catalog bindings, source integrity, engineering evidence boundary
          #   status: current
          # === END DOCS ===

          # === CAPABILITIES ===
          # id: metapat_electromagnetic_pipe_fixture
          #   summary: emits one deterministic catalog-bound engineering application and typed device-design record for the nested three-phase pipe system
          #   exposes: metapat.electromagnetic_pipe_design
          #   inputs: canonical semantic catalog v1
          #   outputs: strict engineering application, typed topology and material-search record, deterministic digest
          #   boundaries: auth:none, storage:serialization-only, network:none, user_data:public engineering handoff only
          # === END CAPABILITIES ===

          # === BOUNDARIES ===
          # id: metapat_electromagnetic_pipe_boundary
          #   summary: engineering proposal and optimization structure only; no electromagnetic, materials, insulation, thermal, fault, spacecraft, measurement, UCNS topology, or theorem-status validity claim
          #   auth_boundary: none
          #   storage_boundary: serialization-only and read-only source verification
          #   network_boundary: none
          #   user_data_boundary: public engineering handoff only
          #   admin_only: false
          # === END BOUNDARIES ===

          # === CONTRACTS ===
          # id: metapat_pipe_control_topology_exact
          #   given: the electromagnetic-pipe design record is constructed
          #   then: three radial layers, two handednesses, three phases per handedness, eighteen phase circuits, and six three-phase control systems remain exact and internally reconciled
          #   class: schema_contract
          #
          # id: metapat_pipe_winding_layers_exact
          #   given: the winding layers are inspected
          #   then: outer 12 AWG at 6 turns per inch, middle 16 AWG at 12, and inner 20 AWG at 18 remain ordered and exact
          #   class: provenance_contract
          #
          # id: metapat_pipe_attractors_not_bearings
          #   given: the mobile-element fields are inspected
          #   then: the objects remain ceramic-coated magnetic eddy-current attractors and are never typed as bearings
          #   class: boundary_contract
          #
          # id: metapat_pipe_alloy_search_bounded
          #   given: the alloy candidates are inspected
          #   then: every candidate is atomic percent, totals 100, preserves Fe plus Co plus Ni at 75, Cr at 15, Mn at 10, and remains a search candidate rather than an ideal-alloy claim
          #   class: materials_boundary
          #
          # id: metapat_pipe_application_catalog_bound
          #   given: the pipe application is constructed
          #   then: every METAPAT use is bound to an exact catalog module identity, digest, and claim status
          #   class: integration_contract
          #
          # id: metapat_pipe_source_current
          #   given: the constructor and handoff source are checked together
          #   then: control topology, geometry, winding, attractor, alloy, instrumentation, fault, high-voltage, next-work, evidence, and hmmm statements remain source-current
          #   class: provenance_contract
          #
          # id: metapat_pipe_performance_firewall
          #   given: the design record and application are inspected
          #   then: electromagnetic, materials, insulation, thermal, mechanical, spacecraft, measurement, topology, theorem-transfer, and METAPAT validity claims remain false
          #   class: boundary_contract
          #
          # id: metapat_pipe_roundtrip_strict
          #   given: a valid design record is serialized and reconstructed
          #   then: every nested field and digest survive while unknown, missing, malformed, or tampered fields fail closed
          #   class: schema_contract
          # === END CONTRACTS ===

          '''
              marker = '"""Catalog-bound three-phase nested electromagnetic-pipe engineering record."""\n\n'
              if not text.startswith(marker):
                  raise SystemExit("unexpected electromagnetic_pipe.py header")
              text = marker + header + text[len(marker):]
              path.write_text(text, encoding="utf-8")
          PY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and generators
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Generate deterministic metadata and fixtures
        run: |
          python tools/generate_application_fixtures.py
          python tools/generate_msdmd.py

      - name: Commit bounded release metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/metapat/electromagnetic_pipe.py src/metapat/fixtures/three-phase-electromagnetic-pipe-v1.json metapat_msdmd.ts
          if git diff --cached --quiet; then
            echo "Release metadata already current."
            exit 0
          fi
          git commit -m "build(release): materialize electromagnetic pipe metadata"
          git push origin HEAD:agent/release-electromagnetic-pipe-v060

  base-package:
    name: Base package / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run unittest contracts
        run: python -m unittest discover -s tests

      - name: Run pytest contracts
        run: python -m pytest -q

  compliance:
    name: Skill graph, generated metadata, applications, catalog, and canon integrity
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Audit source CONTRACTS against test CHECKS
        run: python tools/check_contract_graph.py

      - name: Verify addressable semantic catalog contracts
        run: python -m pytest -q tests/test_catalog.py tests/test_relations.py

      - name: Verify packaged semantic catalog fixture
        run: python tools/generate_catalog.py --check

      - name: Verify catalog source references against exact canon sections
        run: python -c "from pathlib import Path; import metapat; metapat.assert_catalog_complete(); metapat.assert_catalog_sources_match(Path('.'))"

      - name: Verify catalog-bound application contracts
        run: python -m pytest -q tests/test_application.py tests/test_quantum_magnetism.py tests/test_electromagnetic_pipe.py

      - name: Verify packaged application fixtures
        run: python tools/generate_application_fixtures.py --check

      - name: Verify application catalog and source bindings
        run: |
          python - <<'PY'
          from pathlib import Path
          import metapat

          catalog = metapat.canonical_semantic_catalog()
          applications = (
              metapat.quantum_magnetism_application_module(catalog),
              metapat.electromagnetic_pipe_application_module(catalog),
          )
          for application in applications:
              metapat.validate_application_against_catalog(application, catalog)
              metapat.assert_application_sources_match(Path("."), application)
          PY

      - name: Verify explicit Phi policy contracts
        run: python -m pytest -q tests/test_ucns_phi.py

      - name: Verify generated msdmd collection
        run: python tools/generate_msdmd.py --check

      - name: Verify every canon-bearing file byte identity
        run: python -c "from pathlib import Path; import metapat; metapat.assert_canon_files_match(Path('.'))"

      - name: Verify packaged root-spine fixture
        run: python -c "from importlib.resources import files; import metapat; assert files('metapat').joinpath('fixtures/root-spine-envelope-v1.json').read_text(encoding='utf-8').strip() == metapat.root_spine_module_envelope().to_json()"

  actual-ucns-integration:
    name: Actual UCNS adapter / pinned dependency
    runs-on: ubuntu-latest

    steps:
      - name: Check out METAPAT
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install METAPAT with actual UCNS extra
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev,ucns]

      - name: Run envelope and actual UCNS contracts
        run: |
          python -m pytest -q \
            tests/test_envelope.py \
            tests/test_ucns_bridge.py \
            tests/test_packaging.py

      - name: Prove complete semantic provenance survives actual UCNS adaptation
        run: |
          python - <<'PY'
          import metapat
          import ucns

          envelope = metapat.root_spine_module_envelope()
          adaptation = metapat.adapt_envelope_to_ucns(envelope)
          assert isinstance(adaptation.ucns_object, ucns.UCNSObject)
          assert adaptation.record.ucns_object_hash == ucns.stable_hash(adaptation.ucns_object)
          assert adaptation.record.canon_digest == envelope.canon_digest
          assert adaptation.record.envelope_provenance_digest == envelope.provenance_digest
          assert adaptation.record.source_statement_refs == envelope.source_statement_refs
          assert adaptation.record.source_statements == envelope.source_statements
          assert adaptation.record.constraints == envelope.constraints
          assert adaptation.record.permitted_interpretations == envelope.permitted_interpretations
          assert adaptation.record.unresolved_constraints == envelope.unresolved_constraints
          assert adaptation.record.theorem_status_transfer is False
          assert adaptation.record.metapat_validity_claim is False
          PY

  build-and-wheel-smoke:
    name: Build, metadata, and clean-wheel smoke
    runs-on: ubuntu-latest
    needs: [base-package, compliance]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build source and wheel artifacts
        run: python -m build

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Install wheel into a clean environment
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install --upgrade pip
          .wheel-venv/bin/python -m pip install dist/*.whl

      - name: Smoke-test installed base surface without UCNS
        run: |
          .wheel-venv/bin/python - <<'PY'
          from importlib.metadata import version
          from importlib.resources import files

          import metapat

          assert version("metapat") == metapat.__version__ == "0.6.0"
          assert files("metapat").joinpath("py.typed").is_file()
          root_fixture = files("metapat").joinpath("fixtures/root-spine-envelope-v1.json")
          catalog_fixture = files("metapat").joinpath("fixtures/semantic-module-catalog-v1.json")
          application_fixture = files("metapat").joinpath("fixtures/quantum-magnetism-application-v1.json")
          pipe_fixture = files("metapat").joinpath("fixtures/three-phase-electromagnetic-pipe-v1.json")
          assert root_fixture.is_file()
          assert catalog_fixture.is_file()
          assert application_fixture.is_file()
          assert pipe_fixture.is_file()
          envelope = metapat.root_spine_module_envelope()
          catalog = metapat.canonical_semantic_catalog()
          application = metapat.quantum_magnetism_application_module(catalog)
          pipe_design = metapat.electromagnetic_pipe_design(catalog)
          assert root_fixture.read_text(encoding="utf-8").strip() == envelope.to_json()
          assert catalog_fixture.read_text(encoding="utf-8").strip() == catalog.to_json()
          assert application_fixture.read_text(encoding="utf-8").strip() == application.to_json()
          assert pipe_fixture.read_text(encoding="utf-8").strip() == pipe_design.to_json()
          assert envelope.canon_digest == metapat.canon_digest()
          assert catalog.canon_digest == metapat.canon_digest()
          assert application.catalog_digest == catalog.catalog_digest
          assert pipe_design.application.catalog_digest == catalog.catalog_digest
          assert len(catalog.modules) == 39
          assert len(application.catalog_bindings) == 12
          assert len(pipe_design.application.catalog_bindings) == 20
          assert pipe_design.phase_circuit_count == 18
          assert pipe_design.three_phase_system_count == 6
          assert envelope.provenance_digest
          assert catalog.catalog_digest
          assert application.application_digest
          assert pipe_design.design_digest
          assert not hasattr(metapat, "UCNSObject")
          print(f"metapat {metapat.__version__} wheel smoke passed")
          PY
