name: Materialize catalog outputs

on:
  push:
    branches: [agent/semantic-module-catalog-v1]

permissions:
  contents: write

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/semantic-module-catalog-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and generators
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Generate catalog fixture and metadata graph
        run: |
          python tools/generate_catalog.py
          python tools/generate_msdmd.py

      - name: Commit generated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/metapat/fixtures/semantic-module-catalog-v1.json metapat_msdmd.ts
          if git diff --cached --quiet; then
            echo "Generated outputs already current."
            exit 0
          fi
          git commit -m "build(catalog): materialize generated evidence"
          git push origin HEAD:agent/semantic-module-catalog-v1
