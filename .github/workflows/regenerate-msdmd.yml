name: Regenerate msdmd artifact

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/generate_msdmd.py
      - uses: actions/upload-artifact@v4
        with:
          name: metapat-msdmd-generated
          path: metapat_msdmd.ts
          if-no-files-found: error
