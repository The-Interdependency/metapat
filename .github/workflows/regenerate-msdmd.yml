name: Regenerate msdmd artifact

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python tools/generate_msdmd.py
      - name: Commit exact generated output when changed
        run: |
          if git diff --quiet -- metapat_msdmd.ts; then
            echo "Generated metadata already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add metapat_msdmd.ts
          git commit -m "Regenerate METAPAT msdmd metadata"
          git push
